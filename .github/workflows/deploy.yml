name: Deploy React Sandbox to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip pages]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Refresh JSON from Google Sheets CSV
        run: npm run build:data

      - name: Detect data changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- merged-feed.json promotions.json rankings.json; then
            echo "json_changed=false" >> "$GITHUB_OUTPUT"
            echo "No JSON changes detected."
          else
            echo "json_changed=true" >> "$GITHUB_OUTPUT"
            echo "JSON changes detected."
          fi

      - name: Commit refreshed JSON
        if: steps.changes.outputs.json_changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add merged-feed.json promotions.json rankings.json
          git commit -m "chore(data): refresh json [skip pages]"
          git push

      - name: Build
        if: github.event_name != 'schedule' || steps.changes.outputs.json_changed == 'true'
        run: npm run build
        env:
          VITE_BASE_PATH: /React-test/

      - name: Setup Pages
        if: github.event_name != 'schedule' || steps.changes.outputs.json_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'schedule' || steps.changes.outputs.json_changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        if: github.event_name != 'schedule' || steps.changes.outputs.json_changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
